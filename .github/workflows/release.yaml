name: Make GitHub Draft

on:
  push:
    tags:
      - v*

permissions:
  actions: read
  contents: write

jobs:
  meta:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      pre_release: ${{ steps.pre-release.outputs.pre_release }}
    needs:
      - check
      - build
    steps:
      - name: Check pre-release
        id: pre-release
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "pre_release=false" >> $GITHUB_OUTPUT
          else
            echo "pre_release=true" >> $GITHUB_OUTPUT
          fi

  github-release:
    name: Create A GitHub Release
    runs-on: ubuntu-latest
    needs: ["meta"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Generate Release Notes
        run: |
          npx changelogithub@latest --contributors --output release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build All
        run: |
          ./x cargo build --release -p prepoly_driver
          ./x cargo build --release -p prepoly_language_server
          ./x cargo build --release -p prepoly_formatter

          mkdir bin
          mv target/release/prepoly target/release/prepoly-lsp target/release/prepoly-fmt bin/
          tar czf prepoly-"$(rustc --print=host-tuple)".tar.gz bin
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: *.tar.gz
          draft: true
          body_path: release.md
          prerelease: ${{ needs.meta.outputs.pre_release == 'true' }}
